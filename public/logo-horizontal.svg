<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" width="1600" height="600">
  <defs>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00C896"/>
      <stop offset="100%" stop-color="#00A67D"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#E6A600"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="600" fill="#FFFFFF"/>

  <!-- Icon: Grid 2x2 -->
  <g transform="translate(90, 130)" filter="url(#shadow)">
    <rect x="0" y="0" width="140" height="160" rx="14" fill="url(#greenGrad)"/>
    <circle cx="70" cy="60" r="24" fill="#FFFFFF" opacity="0.95"/>
    <rect x="28" y="100" width="84" height="8" rx="4" fill="#FFFFFF" opacity="0.85"/>
    <rect x="38" y="116" width="64" height="6" rx="3" fill="#FFFFFF" opacity="0.6"/>

    <rect x="160" y="0" width="140" height="160" rx="14" fill="#0A1628" stroke="#FFB800" stroke-width="2"/>
    <circle cx="230" cy="60" r="24" fill="url(#goldGrad)"/>
    <rect x="188" y="100" width="84" height="8" rx="4" fill="#FFB800" opacity="0.9"/>
    <rect x="198" y="116" width="64" height="6" rx="3" fill="#FFB800" opacity="0.55"/>

    <rect x="0" y="180" width="140" height="160" rx="14" fill="url(#goldGrad)"/>
    <circle cx="70" cy="240" r="24" fill="#0A1628"/>
    <rect x="28" y="280" width="84" height="8" rx="4" fill="#0A1628" opacity="0.85"/>

    <rect x="160" y="180" width="140" height="160" rx="14" fill="none" stroke="#00C896" stroke-width="3" stroke-dasharray="8 6"/>
    <text x="230" y="275" font-family="Inter, Arial, sans-serif" font-size="90" font-weight="700" fill="#00C896" text-anchor="middle" opacity="0.85">?</text>

    <!-- Camera badge -->
    <g transform="translate(300, 300)">
      <circle cx="0" cy="0" r="42" fill="url(#goldGrad)" stroke="#0A1628" stroke-width="3"/>
      <rect x="-22" y="-14" width="44" height="30" rx="5" fill="#0A1628"/>
      <rect x="-9" y="-20" width="18" height="8" rx="2" fill="#0A1628"/>
      <circle cx="0" cy="3" r="9" fill="url(#goldGrad)"/>
      <circle cx="0" cy="3" r="4" fill="#0A1628"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="520" y="320" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="140" fill="#0A1628">Complete</text>
  <text x="1200" y="320" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="140" fill="#00C896">Aí</text>
  <text x="520" y="390" font-family="Arial, sans-serif" font-weight="600" font-size="28" fill="#6B7280" letter-spacing="2">ÁLBUM DIGITAL · COPA 2026</text>
</svg>
