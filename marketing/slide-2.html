<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: #0A1628;
    overflow: hidden;
    position: relative;
  }
  .content {
    padding: 72px 80px 0;
  }
  .tag {
    text-transform: uppercase;
    color: #FFB800;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    margin-bottom: 40px;
  }
  .title-main {
    font-size: 40px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .title-sub {
    font-size: 28px;
    font-weight: 600;
    color: #6B7280;
    line-height: 1.35;
    margin-bottom: 48px;
  }
  .items {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 48px;
  }
  .item {
    font-size: 20px;
    color: #FFFFFF;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .item-emoji {
    font-size: 22px;
    flex-shrink: 0;
  }
  .highlight-box {
    background: #EF4444;
    border-radius: 12px;
    padding: 20px 28px;
    margin: 0 0 0 0;
  }
  .highlight-text {
    color: #FFFFFF;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
  }
  /* Footer bar */
  .footer-wrapper {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
  }
  .gold-bar {
    background: #FFB800;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 40px;
  }
  .gold-bar-text {
    font-size: 18px;
    font-weight: 700;
    color: #0A1628;
    letter-spacing: 0.5px;
  }
  .footer-bottom {
    background: #0A1628;
    padding: 12px 0;
    text-align: center;
  }
  .footer-url {
    color: #FFFFFF;
    font-size: 14px;
    font-weight: 600;
  }
  .footer-handle {
    color: #00C896;
    font-size: 13px;
    margin-top: 2px;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="tag">O PROBLEMA</div>
    <div class="title-main">980 figurinhas + 48 especiais.</div>
    <div class="title-sub">Sem controle, você compra<br>o que já tem.</div>
    <div class="items">
      <div class="item"><span class="item-emoji">❌</span> Pacotes repetidos</div>
      <div class="item"><span class="item-emoji">❌</span> Lista no papel que some</div>
      <div class="item"><span class="item-emoji">❌</span> Ninguém perto pra trocar</div>
    </div>
    <div class="highlight-box">
      <div class="highlight-text">Resultado: R$ 7.000+ só em pacotes</div>
    </div>
  </div>
  <div class="footer-wrapper">
    <div class="gold-bar">
      <div class="gold-bar-text">⭐ COPA100 = GRÁTIS &nbsp;|&nbsp; COPA50 = 50% OFF &nbsp;|&nbsp; ATÉ 30/04</div>
    </div>
    <div class="footer-bottom">
      <div class="footer-url">completeai.com.br</div>
      <div class="footer-handle">@completeai</div>
    </div>
  </div>
</body>
</html>
