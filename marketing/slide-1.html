<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: #0A1628;
    overflow: hidden;
    position: relative;
  }
  .container {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px;
    position: relative;
  }
  .tag {
    text-transform: uppercase;
    color: #FFB800;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 4px;
    margin-bottom: 32px;
  }
  .title-line {
    font-size: 56px;
    font-weight: 700;
    color: #FFFFFF;
    text-align: center;
    line-height: 1.15;
  }
  .title-green {
    font-size: 56px;
    font-weight: 700;
    color: #00C896;
    font-style: italic;
    text-align: center;
    line-height: 1.15;
    margin-top: 4px;
  }
  .arrow {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 48px;
    color: #00C896;
    opacity: 0.3;
    font-weight: 700;
  }
  .footer {
    position: absolute;
    bottom: 40px;
    left: 0; right: 0;
    text-align: center;
  }
  .footer-url {
    color: #FFFFFF;
    font-size: 16px;
    font-weight: 600;
  }
  .footer-handle {
    color: #00C896;
    font-size: 14px;
    margin-top: 4px;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="tag">ÁLBUM DA COPA 2026</div>
    <div class="title-line">Completar o álbum</div>
    <div class="title-line">custa R$ 7.000+</div>
    <div class="title-green">A menos que...</div>
    <div class="arrow">→</div>
  </div>
  <div class="footer">
    <div class="footer-url">completeai.com.br</div>
    <div class="footer-handle">@completeai</div>
  </div>
</body>
</html>
